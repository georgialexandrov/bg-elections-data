name: Preview Deploy

on:
  push:
    branches: ['**']
  delete:

env:
  PROJECT: elections
  DB_HOST_PATH: /home/sova/data/elections.db

jobs:
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: docker.gitea.com/runner-images:ubuntu-latest
      volumes:
        - /home/sova/data/elections.db:/elections.db:ro
    steps:
      - uses: actions/checkout@v4

      - name: Copy database to workspace
        run: cp /elections.db ${{ github.workspace }}/elections.db

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies and run tests
        run: cd server && pnpm install && pnpm vitest run --reporter=verbose 2>&1

  check-app-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      has_app_code: ${{ steps.check.outputs.has_app_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if branch has app source changes vs main
        id: check
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(server|web|Dockerfile|package\.json|package-lock\.json)'; then
            echo "has_app_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app_code=false" >> "$GITHUB_OUTPUT"
            echo "No app source changes — skipping deploy"
          fi

  deploy:
    if: github.event_name == 'push' && needs.check-app-changes.outputs.has_app_code == 'true'
    needs: [test, check-app-changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set branch slug
        id: slug
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-40 | sed 's/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "container=preview-${PROJECT}-${SLUG}" >> "$GITHUB_OUTPUT"
          echo "host=preview-${PROJECT}-${SLUG}.home.georgi.alexandrov.dev" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t ${{ steps.slug.outputs.container }} .

      - name: Stop old container
        run: docker stop ${{ steps.slug.outputs.container }} 2>/dev/null || true && docker rm ${{ steps.slug.outputs.container }} 2>/dev/null || true

      - name: Run container
        run: |
          docker run -d \
            --name ${{ steps.slug.outputs.container }} \
            --restart unless-stopped \
            -v ${{ env.DB_HOST_PATH }}:/app/elections.db:ro \
            -e PORT=3000 \
            --network proxy-net \
            ${{ steps.slug.outputs.container }}

      - name: Register preview in Caddy
        run: |
          CONTAINER="${{ steps.slug.outputs.container }}"
          HOST="${{ steps.slug.outputs.host }}"
          docker cp caddy:/etc/caddy/Caddyfile /tmp/Caddyfile
          if grep -q "@${CONTAINER} host" /tmp/Caddyfile; then
            echo "Already registered"
            exit 0
          fi
          python3 -c "
          c = open('/tmp/Caddyfile').read()
          entry = '  @${CONTAINER} host ${HOST}\n  handle @${CONTAINER} {\n    reverse_proxy ${CONTAINER}:3000\n  }\n\n'
          c = c.replace('  handle {\n    respond', entry + '  handle {\n    respond')
          open('/tmp/Caddyfile','w').write(c)
          "
          docker cp /tmp/Caddyfile caddy:/etc/caddy/Caddyfile.new
          docker exec caddy sh -c "cat /etc/caddy/Caddyfile.new > /etc/caddy/Caddyfile && rm /etc/caddy/Caddyfile.new"
          docker exec caddy caddy reload --config /etc/caddy/Caddyfile

      - name: Summary
        run: |
          echo "## Preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${{ steps.slug.outputs.host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container:** ${{ steps.slug.outputs.container }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** Passed" >> $GITHUB_STEP_SUMMARY

  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Set branch slug
        id: slug
        run: |
          BRANCH="${{ github.event.ref }}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-40 | sed 's/-$//')
          echo "container=preview-${PROJECT}-${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Stop and remove container
        run: docker stop ${{ steps.slug.outputs.container }} 2>/dev/null || true && docker rm ${{ steps.slug.outputs.container }} 2>/dev/null || true

      - name: Remove Caddy entry and image
        run: |
          CONTAINER="${{ steps.slug.outputs.container }}"
          docker cp caddy:/etc/caddy/Caddyfile /tmp/Caddyfile 2>/dev/null || exit 0
          grep -v "@${CONTAINER}" /tmp/Caddyfile | grep -v "reverse_proxy ${CONTAINER}:" > /tmp/Caddyfile.clean || true
          docker cp /tmp/Caddyfile.clean caddy:/etc/caddy/Caddyfile.new
          docker exec caddy sh -c "cat /etc/caddy/Caddyfile.new > /etc/caddy/Caddyfile && rm /etc/caddy/Caddyfile.new"
          docker exec caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
          docker rmi ${{ steps.slug.outputs.container }} 2>/dev/null || true
