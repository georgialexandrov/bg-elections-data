name: Preview Deploy

on:
  push:
    branches: ['**']
  delete:

env:
  REGISTRY: registry.home.georgi.alexandrov.dev
  PROJECT: elections
  DOMAIN: yolo.home.georgi.alexandrov.dev
  DB_RELEASE_URL: https://git.home.georgi.alexandrov.dev/georgi/bg-elections-data/releases/download/data-v1/elections.db
  DB_CACHE_PATH: /opt/data/elections.db

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set branch slug
        id: slug
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/$PROJECT:$SLUG" >> "$GITHUB_OUTPUT"
          echo "container=preview-${PROJECT}-${SLUG}" >> "$GITHUB_OUTPUT"
          echo "host=${SLUG}.${PROJECT}.${DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t ${{ steps.slug.outputs.image }} .

      - name: Push to registry
        run: docker push ${{ steps.slug.outputs.image }}

      - name: Download elections.db (cached)
        run: |
          if [ ! -f "$DB_CACHE_PATH" ]; then
            mkdir -p /opt/data
            curl -sL "$DB_RELEASE_URL" -o "$DB_CACHE_PATH"
          fi

      - name: Stop old container
        run: docker stop ${{ steps.slug.outputs.container }} 2>/dev/null || true && docker rm ${{ steps.slug.outputs.container }} 2>/dev/null || true

      - name: Run container
        run: |
          docker run -d \
            --name ${{ steps.slug.outputs.container }} \
            --restart unless-stopped \
            -v ${{ env.DB_CACHE_PATH }}:/app/elections.db:ro \
            -e PORT=3000 \
            --label "caddy=${{ steps.slug.outputs.host }}" \
            --label "caddy.reverse_proxy={{upstreams 3000}}" \
            ${{ steps.slug.outputs.image }}

      - name: Add Caddy route
        run: |
          # Get container IP
          IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' ${{ steps.slug.outputs.container }})

          # Add route via Caddy API
          curl -s -X POST "http://localhost:2019/config/apps/http/servers/srv0/routes" \
            -H "Content-Type: application/json" \
            -d '{
              "@id": "preview-${{ steps.slug.outputs.container }}",
              "match": [{"host": ["${{ steps.slug.outputs.host }}"]}],
              "handle": [{"handler": "reverse_proxy", "upstreams": [{"dial": "'$IP':3000"}]}]
            }' || echo "Caddy route may need manual config"

      - name: Summary
        run: |
          echo "## Preview deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${{ steps.slug.outputs.host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container:** ${{ steps.slug.outputs.container }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.slug.outputs.image }}" >> $GITHUB_STEP_SUMMARY

  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Set branch slug
        id: slug
        run: |
          BRANCH="${{ github.event.ref }}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | sed 's/-\+/-/g; s/^-//; s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "container=preview-${PROJECT}-${SLUG}" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/$PROJECT:$SLUG" >> "$GITHUB_OUTPUT"

      - name: Stop and remove container
        run: docker stop ${{ steps.slug.outputs.container }} 2>/dev/null || true && docker rm ${{ steps.slug.outputs.container }} 2>/dev/null || true

      - name: Remove Caddy route
        run: curl -s -X DELETE "http://localhost:2019/id/preview-${{ steps.slug.outputs.container }}" || true

      - name: Remove image
        run: docker rmi ${{ steps.slug.outputs.image }} 2>/dev/null || true

      - name: Summary
        run: |
          echo "## Preview cleaned up" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.event.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container:** ${{ steps.slug.outputs.container }} (removed)" >> $GITHUB_STEP_SUMMARY
