name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: elections
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/elections
            git pull origin main
            pnpm install --frozen-lockfile
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} pnpm --filter web build
            rm -rf /opt/elections/og-cache/*
            sudo rm -rf /var/cache/nginx/*
            sudo systemctl restart elections-api
            sudo nginx -s reload
