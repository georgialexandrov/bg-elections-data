name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: elections
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/elections
            git pull origin main
            pnpm install --frozen-lockfile
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} pnpm --filter web build
            rm -rf /opt/elections/og-cache/*
            # The nginx cache dir is www-data-owned and 700, so the
            # `elections` user can't expand `*` against it. A root-owned
            # wrapper script does the find+delete under sudo, whitelisted
            # in /etc/sudoers.d/elections.
            sudo /usr/local/sbin/elections-nginx-flush
            sudo systemctl restart elections-api
            # Restart discovery only if the unit exists (installed once via
            # discovery/scripts/bootstrap.sh). Safe no-op on fresh clones.
            if systemctl list-unit-files | grep -q '^elections-video\.service'; then
              sudo systemctl restart elections-video
            fi
