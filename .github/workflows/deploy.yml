name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: elections
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/elections
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm --filter web build
            sudo systemctl restart elections-api
            # Purge nginx proxy_cache so clients see the new code/response shape.
            # Cache has 7d TTL; without this, stale JSON could persist until inactive.
            sudo rm -rf /var/cache/nginx/elections/*
            sudo systemctl reload nginx
