name: Deploy DB

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release with DB
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            // If triggered by release, use that release
            // If manual, find latest release with elections.db
            let release;
            if (context.payload.release) {
              release = context.payload.release;
            } else {
              const releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
              });
              release = releases.data.find(r =>
                r.assets.some(a => a.name === 'elections.db')
              );
              if (!release) throw new Error('No release with elections.db found');
            }
            const asset = release.assets.find(a => a.name === 'elections.db');
            if (!asset) {
              console.log('No elections.db in this release, skipping');
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('skip', 'false');
            core.setOutput('download_url', asset.browser_download_url);
            core.setOutput('tag', release.tag_name);

      - name: Deploy DB via SSH
        if: steps.release.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: elections
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/elections
            echo "Downloading elections.db from ${{ steps.release.outputs.tag }}..."
            curl -L -o elections.db.new "${{ steps.release.outputs.download_url }}"
            mv elections.db.new elections.db
            sqlite3 elections.db "PRAGMA journal_mode=WAL;"
            sudo systemctl restart elections-api
            # Clear nginx cache so new data is served
            sudo rm -rf /var/cache/nginx/elections/*
            sudo systemctl reload nginx
            echo "DB deployed from ${{ steps.release.outputs.tag }}"
